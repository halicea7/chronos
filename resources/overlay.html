<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }
    window.addEventListener('resize', resize);
    resize();

    let start = null;
    let current = null;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (start && current) {
        const x = Math.min(start.x, current.x);
        const y = Math.min(start.y, current.y);
        const w = Math.abs(current.x - start.x);
        const h = Math.abs(current.y - start.y);

        ctx.clearRect(x, y, w, h);

        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

        if (w > 30 && h > 16) {
          const label = w + ' × ' + h;
          ctx.font = '11px -apple-system, ui-monospace, monospace';
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.fillText(label, x + 5, y > 20 ? y - 5 : y + h + 13);
        }
      }
    }

    document.addEventListener('mousedown', function(e) {
      start = { x: e.clientX, y: e.clientY };
      current = { x: e.clientX, y: e.clientY };
      draw();
    });

    document.addEventListener('mousemove', function(e) {
      if (!start) return;
      current = { x: e.clientX, y: e.clientY };
      draw();
    });

    document.addEventListener('mouseup', function(e) {
      if (!start) return;
      current = { x: e.clientX, y: e.clientY };
      var x = Math.round(Math.min(start.x, current.x));
      var y = Math.round(Math.min(start.y, current.y));
      var w = Math.round(Math.abs(current.x - start.x));
      var h = Math.round(Math.abs(current.y - start.y));
      window.overlayBridge.selectRect(x, y, w, h);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') window.overlayBridge.cancel();
    });
  </script>
</body>
</html>
